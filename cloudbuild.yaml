substitutions:
  _PROJECT_ID: ${PROJECT_ID}
  _REGION: asia-northeast1
  _SERVICE_NAME: daily-report-app
  _IMAGE: asia-northeast1-docker.pkg.dev/${_PROJECT_ID}/daily-report-app/${_SERVICE_NAME}

steps:
  # Build the container image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=${_IMAGE}:${SHORT_SHA}
      - --tag=${_IMAGE}:latest
      - --cache-from=${_IMAGE}:latest
      - .

  # Push image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_IMAGE}

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --port=3000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=60s
      - --no-allow-unauthenticated
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM
